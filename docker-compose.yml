services:
  # BASE DE DATOS
  db:
    image: mysql:${MYSQL_VERSION}
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
    ports:
      - "${PORT_DATABASE}:3306"
    volumes:
      - db_data:/var/lib/mysql

  # BACKEND (Spring Boot)
  backend:
    build: 
       context: ./backend
       dockerfile: ../dockerfile-backend
    restart: always
    ports:
      - "${PORT_BACKEND}:8080"
    depends_on:
      - db
    environment:
      # Estas variables las leerá tu application.yml
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_ROOT_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - CORS_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - UPLOAD_DIR=/app/uploads
    # Esto asegura que el backend espere a que la DB esté sana
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    volumes:
      - ./backend/uploads:/app/uploads

  # FRONTEND (React)
  frontend:
    build: 
       context: ./frontend
       dockerfile: ../dockerfile-frontend
    ports:
      - "${PORT_FRONTEND}:3000"
    depends_on:
      - backend
    stdin_open: true
    environment:
      - NODE_ENV=${FRONTEND_MODE:-development}
      - VITE_API_URL=http://localhost:${PORT_BACKEND}
    volumes:
      - ./frontend:/app        
      - /app/node_modules      

volumes:
  db_data:
